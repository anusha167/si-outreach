<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — SI Outreach</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.10);
    }
    .login-logo { text-align: center; }
    .login-logo .wordmark { font-size: 22px; font-weight: 800; color: var(--accent); letter-spacing: -0.5px; }
    .login-logo .sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .login-card h2 { font-size: 18px; font-weight: 600; text-align: center; margin-top: 4px; }
    .login-card input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 14px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      font-family: inherit;
    }
    .login-card input:focus { border-color: var(--accent); }
    .login-card button {
      width: 100%;
      padding: 11px;
      background: var(--cta);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.3px;
      margin-top: 4px;
    }
    .login-card button:hover { background: var(--cta-hover); }
    .login-error { color: var(--red); font-size: 13px; text-align: center; min-height: 18px; }
    .divider { border: none; border-top: 1px solid var(--border); }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <div class="wordmark">⚡ SI Outreach</div>
      <div class="sub">Startup Incubator at UCSD</div>
    </div>
    <hr class="divider" />
    <h2>Sign in</h2>
    <input type="email" id="login-email" placeholder="Email address" autocomplete="email" />
    <input type="password" id="login-password" placeholder="Password" autocomplete="current-password" />
    <button id="btn-login">Sign In</button>
    <div class="login-error" id="login-error"></div>
  </div>

  <script>
    async function doLogin() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const errEl = document.getElementById('login-error');
      errEl.textContent = '';
      if (!email || !password) {
        errEl.textContent = 'Please enter your email and password.';
        return;
      }
      try {
        const r = await fetch('/api/login', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          credentials: 'include',
          body: JSON.stringify({email, password}),
        });
        if (r.ok) {
          window.location.href = '/';
        } else {
          const d = await r.json().catch(() => ({}));
          errEl.textContent = d.error || 'Incorrect email or password.';
          document.getElementById('login-password').value = '';
          document.getElementById('login-password').focus();
        }
      } catch (e) {
        errEl.textContent = 'Connection error — is the server running?';
      }
    }

    document.getElementById('btn-login').addEventListener('click', doLogin);
    document.getElementById('login-password').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
    document.getElementById('login-email').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('login-password').focus();
    });

    fetch('/api/me', {credentials: 'include'})
      .then(r => r.json())
      .then(d => { if (d.logged_in) window.location.href = '/'; })
      .catch(() => {});
  </script>
</body>
</html>
